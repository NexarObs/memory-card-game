<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register - Memory Game</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/login-register.css}">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>

<body>

    <div class="mascot-row">
        <img src="/images/bmo.png" alt="bmo" class="mascot-img">
        <div class="bubble">
            Join now and start playing<span class="cursor">_</span>
        </div>
    </div>

    <div class="panel">

        <span class="cdot tl"></span>
        <span class="cdot tr"></span>
        <span class="cdot bl"></span>
        <span class="cdot br"></span>

       <div class="panel-header">
            <h1>Create account</h1>
            <p>Join us and start palying</p>
        </div>

        <form th:action="@{/register}" method="post">

            <div>
                <label>Username</label>
                <div class="input-wrapper">
                    <i class="fa-regular fa-user input-icon"></i>
                    <input type="text" name="username" placeholder="your name" required>
                </div>
            </div>

            <div>
                <label>Password</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock input-icon"></i>
                    <input type="password" name="password" placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;" required>
                </div>
            </div>

            <button type="submit">Create Account</button>
    

        </form>

        <div class="error" th:if="${error}" th:text="${error}"></div>

        <div class="link">
            Already have an account? <a th:href="@{/login}">Login</a>
        </div>
        

    </div>

</body>
</html>
